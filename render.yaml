services:
  # Backend Web Service
  - type: web
    name: hiresphere-backend
    runtime: node
    plan: free # Change to starter if you need more power
    rootDir: JOB-PORTAL/Backend
    buildCommand: npm install --legacy-peer-deps
    startCommand: node index.js
    envVars:
      - key: MONGO_URI
        sync: false # User will provide this in Render Dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5011
      - key: CORS_ORIGIN
        fromService:
          name: hiresphere-frontend
          type: static_site
          property: url
      - key: NODE_VERSION
        value: 20 # Using a stable LTS version
      - key: CLOUD_NAME
        sync: false
      - key: CLOUD_API_KEY
        sync: false
      - key: CLOUD_API_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SEED_DUMMY_JOBS
        value: false

  # Frontend Static Site
  - type: static_site
    name: hiresphere-frontend
    runtime: node
    plan: free
    rootDir: JOB-PORTAL/Frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: hiresphere-backend
          type: web
          property: url
      - key: NODE_VERSION
        value: 20
